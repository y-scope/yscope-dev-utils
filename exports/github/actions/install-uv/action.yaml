name: "Install uv"
description: "Install a pinned uv version using a pinned setup-uv action."

inputs:
  version:
    description: "The uv version to install."
    required: false
    default: "0.11.3"

runs:
  using: "composite"
  steps:
    - name: "Install uv"
      uses: "astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57"  # v8.0.0
      with:
        version: "${{ inputs.version }}"
