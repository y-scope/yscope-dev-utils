name: "unit-tests"

on:
  pull_request:
  push:
  schedule:
    # Run daily at 00:20 UTC
    - cron: "20 0 * * *"
  workflow_dispatch:

permissions: {}

concurrency:
  group: "${{github.workflow}}-${{github.ref}}"

  # Cancel in-progress jobs for efficiency
  cancel-in-progress: true

jobs:
  unit-tests:
    strategy:
      matrix:
        os:
          - "macos-15"
          - "ubuntu-22.04"
          - "ubuntu-24.04"
    runs-on: "${{matrix.os}}"
    steps:
      - uses: "actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd"  # v6.0.2
        with:
          submodules: "recursive"

      - uses: "./exports/github/actions/install-go-task"

      - uses: "./exports/github/actions/install-uv"

      - uses: "./exports/github/actions/print-tool-versions"

      - name: "Run unit tests"
        run: "task test"
